services:
  repairshop:
    image: fam1152/repairshop:latest
    container_name: repairshop
    restart: unless-stopped
    ports:
      - "3000:3000"
      - "3443:3443"
    volumes:
      - /mnt/tank/repairshop-data:/data
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/app
      - /app/node_modules
      - /app/client/node_modules
    environment:
      - PORT=3000
      - NODE_ENV=production
      - DB_PATH=/data/repairshop.sqlite
      - UPLOADS_PATH=/data/uploads
      - PRINT_QUEUE_PATH=/data/print-queue
      - JWT_SECRET=change_me_to_something_long_and_random_before_deploying
      - GOOGLE_CLIENT_ID=
      - GOOGLE_CLIENT_SECRET=
      - GOOGLE_REDIRECT_URI=http://YOUR-TRUENAS-IP:3000/api/appointments/google/callback
      - DOCKER_IMAGE=fam1152/repairshop:latest
      # HTTPS / SSL — enables camera on LAN devices
      - SSL_CERT=/data/ssl/cert.pem
      - SSL_KEY=/data/ssl/key.pem
      - HTTPS_PORT=3443
      # Ollama AI — points to the existing service on the host
      - OLLAMA_URL=http://10.1.10.226:11434
      - OLLAMA_MODEL=llama3.2
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
