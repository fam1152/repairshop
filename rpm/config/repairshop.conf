# RepairShop Configuration
# /etc/repairshop/repairshop.conf
#
# After editing this file, restart the service:
#   sudo systemctl restart repairshop

# ── Network ──────────────────────────────────────────────
# HTTP port (plain, also redirects to HTTPS if SSL is configured)
PORT=3000

# HTTPS port (needed for camera/scanner on LAN devices)
HTTPS_PORT=3443

# ── Paths ────────────────────────────────────────────────
# Database location
DB_PATH=/var/lib/repairshop/repairshop.sqlite

# Uploads (photos, avatars, backups)
UPLOADS_PATH=/var/lib/repairshop/uploads

# ── SSL ──────────────────────────────────────────────────
# Self-signed cert is auto-generated on first install.
# To use your own cert, replace these files and restart.
SSL_CERT=/var/lib/repairshop/ssl/cert.pem
SSL_KEY=/var/lib/repairshop/ssl/key.pem

# ── Security ─────────────────────────────────────────────
# IMPORTANT: Change this before first use!
# Generate a strong secret with: openssl rand -hex 64
JWT_SECRET=CHANGE_ME_TO_A_LONG_RANDOM_STRING_BEFORE_FIRST_USE

# ── AI / Ollama ───────────────────────────────────────────
# URL of your Ollama instance
# If Ollama is installed locally: http://localhost:11434
# If using a remote server: http://192.168.1.x:11434
OLLAMA_URL=http://localhost:11434
OLLAMA_MODEL=llama3.2

# ── Google Calendar (optional) ───────────────────────────
# See: https://console.cloud.google.com/
GOOGLE_CLIENT_ID=
GOOGLE_CLIENT_SECRET=
GOOGLE_REDIRECT_URI=http://localhost:3000/api/appointments/google/callback

# ── Environment ──────────────────────────────────────────
NODE_ENV=production
